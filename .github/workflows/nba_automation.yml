name: NBA Oracle Automation

on:
  schedule:
    # Se ejecuta a las 10:00 AM UTC (aprox 4:00 AM CDMX) para el Backtester
    - cron: '0 10 * * *'
    # Se ejecuta a las 10:00 PM UTC (aprox 4:00 PM CDMX) para el Predictor
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy nba_api joblib scikit-learn xgboost

      - name: Ejecutar Backtester (Auditoría)
        run: python nba_backtester.py

      - name: Ejecutar Predictor (Nuevos Picks)
        run: python nba_predictor.pys

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Agregamos los archivos de uno en uno con "|| true" para que no truene si uno falta
          git add predictions.json || true
          git add predictions_history.csv || true
          git add results.json || true
          
          # Solo hace commit si detecta cambios reales en los archivos
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatización: Actualización de picks y resultados" && git push)
