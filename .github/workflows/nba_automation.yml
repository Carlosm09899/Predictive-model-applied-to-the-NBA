name: NBA Oracle Automation

on:
  schedule:
    # 04:00 AM CDMX (Auditoría de los juegos de ayer)
    - cron: '0 10 * * *'
    # 11:00 AM CDMX (Predicciones para los juegos de hoy)
    - cron: '0 17 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy nba_api joblib scikit-learn xgboost

      - name: Ejecutar Auditoría (Backtester)
        run: python nba_backtester.py

      - name: Ejecutar Predicciones (Predictor)
        run: python nba_predictor.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Agregamos los archivos de datos generados
          git add predictions.json || true
          git add predictions_history.csv || true
          git add results.json || true
          
          # Solo guarda si hay cambios reales para mantener el repo limpio
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatización: Sincronización 4AM/11AM CDMX" && git push)
