<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo NBA - Dashboard Dinámico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 selection:bg-amber-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Iconos SVG integrados (No dependen de librerías externas)
        const Icons = {
            Trophy: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            ),
            TrendingUp: ({ size = 20 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            ),
            Clock: ({ size = 12 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ),
            Activity: ({ size = 24 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            ),
            Zap: ({ size = 20, fill = "none" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            ),
            Target: ({ size = 24 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            ),
            Search: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            ),
            Info: ({ size = 14 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            ),
            ChevronRight: ({ size = 20 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            )
        };

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                // Función para cargar datos reales
                const fetchData = async () => {
                    try {
                        const response = await fetch('predictions.json');
                        if (!response.ok) throw new Error('No se encontró el archivo de predicciones.');
                        const data = await response.json();
                        setPredictions(data);
                    } catch (err) {
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-950">
                        <div className="flex flex-col items-center gap-4">
                            <div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                            <p className="text-amber-500 font-black uppercase tracking-widest animate-pulse">Cargando Oráculo...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-950 p-10 text-center">
                        <div className="max-w-md bg-slate-900 border border-red-500/50 p-8 rounded-3xl">
                            <h2 className="text-red-500 font-black text-2xl mb-4 uppercase">⚠️ Error de Conexión</h2>
                            <p className="text-slate-400 mb-6 font-medium">No pudimos cargar 'predictions.json'. Asegúrate de haber corrido <code className="bg-slate-950 px-2 py-1 rounded text-amber-500 italic">python nba_predictor.py</code> en tu terminal.</p>
                            <button onClick={() => window.location.reload()} className="bg-red-500 text-white font-black px-6 py-2 rounded-xl uppercase tracking-widest text-xs hover:bg-red-600 transition-all">Reintentar</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Navbar */}
                    <nav className="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-500 p-1.5 rounded-lg text-slate-950"><Icons.Trophy /></div>
                                <span className="text-xl font-black tracking-tighter text-white uppercase italic">ORÁCULO<span className="text-amber-500">NBA</span></span>
                            </div>
                            <div className="hidden md:flex items-center gap-6 text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase">
                                <span className="text-amber-500 border-b-2 border-amber-500 pb-1">Cartelera</span>
                                <span>Historial</span>
                                <span>Métricas</span>
                            </div>
                            <div className="w-10 h-10 bg-slate-800 rounded-xl border border-slate-700 flex items-center justify-center font-bold text-amber-500 shadow-xl">C</div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-6 md:p-8">
                        {/* Stats Header */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
                            {[
                                { label: 'Efectividad', val: '68.4%', icon: <Icons.Activity />, color: 'text-blue-400', bg: 'bg-blue-500/10' },
                                { label: 'Profit', val: '+14.2u', icon: <Icons.TrendingUp size={24} />, color: 'text-amber-500', bg: 'bg-amber-500/10' },
                                { label: 'ROI', val: '12.8%', icon: <Icons.Target />, color: 'text-purple-400', bg: 'bg-purple-500/10' },
                                { label: 'Juegos Hoy', val: predictions.length, icon: <Icons.Zap size={24} />, color: 'text-cyan-400', bg: 'bg-cyan-500/10' }
                            ].map((stat, i) => (
                                <div key={i} className="bg-slate-900/40 border border-slate-800 p-5 rounded-2xl flex items-center gap-4 shadow-xl">
                                    <div className={`${stat.bg} p-3 rounded-xl ${stat.color}`}>{stat.icon}</div>
                                    <div>
                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{stat.label}</p>
                                        <p className="text-2xl font-black text-white">{stat.val}</p>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mb-8 px-2">
                            <h2 className="text-2xl font-black text-white flex items-center gap-3 italic uppercase tracking-tighter">
                                <Icons.Search className="text-amber-500" /> Picks Activos: {predictions.length}
                            </h2>
                        </div>

                        {/* Grid Dinámico */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            {predictions.map((game) => (
                                <div key={game.id} className={`relative bg-slate-900/60 backdrop-blur-sm border ${game.edgeTotal > 8 ? 'border-amber-500/50 shadow-[0_0_40px_-10px_rgba(245,158,11,0.25)]' : 'border-slate-800'} rounded-[2.5rem] overflow-hidden transition-all hover:scale-[1.01] group`}>
                                    
                                    <div className="p-6 pb-2 flex justify-between items-center">
                                        <div className="flex items-center gap-2 text-slate-500 bg-slate-950/80 px-3 py-1.5 rounded-full border border-slate-800">
                                            <Icons.Clock className="text-amber-500" />
                                            <span className="text-[10px] font-black uppercase tracking-widest">{game.time}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="h-1.5 w-16 bg-slate-800 rounded-full overflow-hidden">
                                                <div className="h-full bg-amber-500" style={{ width: `${game.confidence}%` }}></div>
                                            </div>
                                            <span className="text-[9px] font-black text-amber-500 uppercase italic tracking-widest">{game.confidence}% Conf.</span>
                                        </div>
                                    </div>

                                    <div className="px-8 py-6 flex items-center justify-between">
                                        <div className="text-center w-1/3">
                                            <div className="text-5xl font-black text-slate-800 mb-1 group-hover:text-amber-500/10 transition-colors uppercase">{game.awayTri}</div>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest truncate">{game.away}</p>
                                            <p className="text-4xl font-black text-white tracking-tighter">{game.aPred}</p>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <div className="text-slate-800 font-black text-xl italic tracking-tighter">VS</div>
                                            <div className="h-12 w-px bg-slate-800 my-2"></div>
                                            <div className={`px-2 py-1 rounded text-[9px] font-black italic tracking-widest ${game.edgeTotal > 8 ? 'bg-amber-500 text-slate-950 animate-pulse' : 'bg-slate-800 text-slate-500'}`}>
                                                {game.edgeTotal > 8 ? 'ALTA VENTAJA' : 'REGULAR'}
                                            </div>
                                        </div>
                                        <div className="text-center w-1/3">
                                            <div className="text-5xl font-black text-slate-800 mb-1 group-hover:text-amber-500/10 transition-colors uppercase">{game.homeTri}</div>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest truncate">{game.home}</p>
                                            <p className="text-4xl font-black text-white tracking-tighter">{game.hPred}</p>
                                        </div>
                                    </div>

                                    <div className="mx-6 mb-6 bg-slate-950/80 rounded-3xl grid grid-cols-3 divide-x divide-slate-900 border border-slate-800/40">
                                        <div className="p-4 text-center">
                                            <p className="text-[8px] font-black text-slate-600 uppercase mb-1 tracking-widest">Hándicap</p>
                                            <p className="text-lg font-black text-amber-500 italic leading-none">{game.spread > 0 ? `+${game.spread.toFixed(1)}` : game.spread.toFixed(1)}</p>
                                        </div>
                                        <div className="p-4 text-center">
                                            <p className="text-[8px] font-black text-slate-600 uppercase mb-1 tracking-widest">Total O/U</p>
                                            <p className="text-lg font-black text-white italic leading-none">{game.total.toFixed(1)}</p>
                                        </div>
                                        <div className="p-4 text-center flex flex-col items-center justify-center">
                                            <p className="text-[8px] font-black text-slate-600 uppercase mb-1 tracking-widest">Ganador</p>
                                            <div className="flex items-center gap-1 text-emerald-400 font-black italic text-[10px] uppercase tracking-tighter">
                                                <Icons.Trophy /><span className="truncate">{game.winner}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {game.edgeTotal > 8 ? (
                                        <div className="bg-amber-500 p-4 flex items-center justify-between cursor-pointer hover:bg-amber-400 transition-colors">
                                            <div className="flex items-center gap-3">
                                                <Icons.Zap size={18} className="text-slate-950" fill="currentColor" />
                                                <span className="text-[10px] font-black text-slate-950 uppercase tracking-widest italic">VALOR DETECTADO! EDGE: {game.edgeTotal} PTS</span>
                                            </div>
                                            <Icons.ChevronRight size={18} className="text-slate-950" />
                                        </div>
                                    ) : (
                                        <div className="p-3 flex items-center justify-center gap-2 text-slate-600 text-[9px] font-black uppercase tracking-widest hover:text-slate-400 transition-colors cursor-pointer border-t border-slate-800/50 bg-slate-900/40">
                                            <Icons.Info /> Ver Análisis Detallado
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="max-w-7xl mx-auto mt-20 pb-12 px-8 border-t border-slate-900 pt-10">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center font-black text-slate-950 shadow-lg shadow-amber-500/20">C</div>
                                <div>
                                    <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest leading-none">Carlos Intelligence Unit</p>
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-tight">© 2026 Predictive Model • Powered by XGBoost V3</p>
                                </div>
                            </div>
                            <div className="flex gap-6 text-[9px] font-black text-slate-600 uppercase tracking-widest">
                                <div className="flex items-center gap-2"><span className="w-1.5 h-1.5 bg-slate-800 rounded-full"></span> ML Oráculo</div>
                                <div className="flex items-center gap-2"><span className="w-1.5 h-1.5 bg-slate-800 rounded-full"></span> Playdoit Standards</div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
