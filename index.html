<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo NBA - Carlos Pro</title>
    <!-- Motores de Diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.4);
        }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Trophy: ({className}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            ),
            Zap: ({ size = 18, fill = "none", className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            ),
            Target: ({size = 18}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            )
        };

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    const version = new Date().getTime(); // Cache busting
                    try {
                        const [pRes, hRes] = await Promise.allSettled([
                            fetch(`predictions.json?v=${version}`).then(r => r.json()),
                            fetch(`results.json?v=${version}`).then(r => r.json())
                        ]);
                        if (pRes.status === 'fulfilled') setPredictions(pRes.value);
                        if (hRes.status === 'fulfilled') setHistory(hRes.value);
                    } catch (e) { console.error(e); }
                    setLoading(false);
                };
                loadData();
            }, []);

            if (loading) return (
                <div className="flex h-screen flex-col items-center justify-center space-y-4">
                    <div className="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-amber-500 font-black text-[10px] uppercase tracking-[0.3em] animate-pulse">Sincronizando Inteligencia...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto p-5 pb-20">
                    <header className="flex justify-between items-center mb-10 pt-4">
                        <div>
                            <h1 className="text-3xl font-black italic tracking-tighter text-white">ORÁCULO<span className="text-amber-500">NBA</span></h1>
                            <p className="text-slate-500 text-[9px] font-black uppercase tracking-widest">Carlos Intelligence Unit • V3.5</p>
                        </div>
                        <div className="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-xl text-center shadow-lg">
                            <p className="text-[8px] text-slate-500 font-black uppercase mb-0.5">Accurate ML</p>
                            <p className="text-sm font-black text-emerald-400">ONLINE</p>
                        </div>
                    </header>

                    {/* SECCIÓN 1: CARTELERA ACTIVA */}
                    <section className="mb-14">
                        <h2 className="text-sm font-black text-white mb-6 flex items-center gap-2 uppercase tracking-tight italic">
                            <Icons.Zap size={16} className="text-amber-500" fill="currentColor"/> Cartelera para Hoy
                        </h2>
                        {predictions.length > 0 ? (
                            <div className="space-y-6">
                                {predictions.map((game, i) => (
                                    <div key={i} className={`glass-card rounded-[2.5rem] overflow-hidden ${game.edgeTotal > 8 ? 'ring-1 ring-amber-500/50' : ''}`}>
                                        <div className="px-5 py-3 flex justify-between items-center bg-slate-950/40 border-b border-slate-800/50 text-[9px] font-black uppercase">
                                            <span className="text-slate-500">{game.time}</span>
                                            <span className="text-amber-500 italic">{game.confidence}% Conf.</span>
                                        </div>
                                        <div className="p-8 flex justify-around items-center">
                                            <div className="text-center w-24">
                                                <p className="text-3xl font-black text-slate-800 uppercase leading-none mb-2">{game.awayTri}</p>
                                                <p className="text-2xl font-black text-white tracking-tighter">{game.aPred}</p>
                                            </div>
                                            <div className="text-slate-800 font-black text-xl italic tracking-tighter">VS</div>
                                            <div className="text-center w-24">
                                                <p className="text-3xl font-black text-slate-800 uppercase leading-none mb-2">{game.homeTri}</p>
                                                <p className="text-2xl font-black text-white tracking-tighter">{game.hPred}</p>
                                            </div>
                                        </div>
                                        <div className="bg-slate-950/60 px-5 py-4 grid grid-cols-2 gap-4 text-center border-t border-slate-800/50">
                                            <div>
                                                <p className="text-[8px] font-black text-slate-600 uppercase mb-1 tracking-widest">Spread {game.homeTri}</p>
                                                <p className="text-lg font-black text-amber-500 italic leading-none">{game.spread > 0 ? `+${game.spread}` : game.spread}</p>
                                            </div>
                                            <div>
                                                <p className="text-[8px] font-black text-slate-600 uppercase mb-1 tracking-widest">Total O/U</p>
                                                <p className="text-lg font-black text-white italic leading-none">{game.total}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-slate-900/30 border border-dashed border-slate-800 p-12 rounded-[2.5rem] text-center">
                                <p className="text-slate-600 font-black uppercase tracking-[0.2em] text-[9px] italic">Esperando actualización de cartelera<br/>(11:00 AM CDMX)</p>
                            </div>
                        )}
                    </section>

                    {/* SECCIÓN 2: AUDITORÍA TRIPLE INDICADOR */}
                    <section>
                        <h2 className="text-sm font-black text-white mb-6 flex items-center gap-2 uppercase tracking-tight italic">
                            <Icons.Trophy className="text-emerald-500" /> Auditoría Detallada
                        </h2>
                        <div className="glass-card rounded-[2rem] overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-950 text-[8px] font-black text-slate-600 uppercase tracking-widest border-b border-slate-800">
                                        <tr>
                                            <th className="p-5">Encuentro</th>
                                            <th className="p-5 text-center">ML</th>
                                            <th className="p-5 text-center">Spread</th>
                                            <th className="p-5 text-center">O/U</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/40">
                                        {history.length > 0 ? history.map((res, i) => {
                                            // Lógica de cálculo de precisión
                                            const mlHit = (res.Pred_Home > res.Pred_Away) === (res.Actual_Home > res.Actual_Away);
                                            const spreadErr = Math.abs((res.Actual_Home - res.Actual_Away) - (res.Pred_Home - res.Pred_Away));
                                            const totalErr = Math.abs((res.Actual_Home + res.Actual_Away) - (res.Pred_Total || (res.Pred_Home + res.Pred_Away)));

                                            return (
                                                <tr key={i} className="hover:bg-white/[0.01]">
                                                    <td className="p-5">
                                                        <p className="text-[10px] font-black text-white uppercase leading-none mb-1">{res.Away} @ {res.Home}</p>
                                                        <p className="text-[9px] text-slate-500 font-bold tracking-tighter italic tabular-nums">R: {res.Actual_Away}-{res.Actual_Home}</p>
                                                    </td>
                                                    <td className="p-5 text-center">
                                                        <span className={`inline-block w-8 py-1 rounded text-[8px] font-black italic ${mlHit ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}`}>
                                                            {mlHit ? 'WIN' : 'LOSS'}
                                                        </span>
                                                    </td>
                                                    <td className="p-5 text-center">
                                                        <span className={`inline-block w-8 py-1 rounded text-[8px] font-black italic ${spreadErr < 6.5 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-500'}`}>
                                                            {spreadErr < 6.5 ? 'HIT' : `±${Math.round(spreadErr)}`}
                                                        </span>
                                                    </td>
                                                    <td className="p-5 text-center">
                                                        <span className={`inline-block w-8 py-1 rounded text-[8px] font-black italic ${totalErr < 8.5 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-500'}`}>
                                                            {totalErr < 8.5 ? 'HIT' : `±${Math.round(totalErr)}`}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        }) : (
                                            <tr>
                                                <td colSpan="4" className="p-12 text-center text-slate-700 text-[9px] font-black uppercase italic tracking-widest">
                                                    Esperando resultados oficiales<br/>(11:00 PM CDMX)
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>

                    <footer className="mt-20 py-10 border-t border-slate-900/50 text-center">
                        <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center font-black text-slate-950 mx-auto mb-5 shadow-lg shadow-amber-500/20">C</div>
                        <p className="text-[9px] text-slate-600 font-black uppercase tracking-[0.4em]">XGBoost optimized • Engine V3.5</p>
                        <div className="flex justify-center gap-6 mt-4 opacity-40">
                             <Icons.Target />
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
