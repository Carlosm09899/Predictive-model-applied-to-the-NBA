<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo NBA - Carlos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 25px 30px -10px rgba(0, 0, 0, 0.6);
        }
        .bet-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }
        .glow-wr {
            text-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
        }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    // Cache busting para forzar descarga de archivos nuevos
                    const version = new Date().getTime(); 
                    try {
                        const [pRes, hRes] = await Promise.allSettled([
                            fetch(`predictions.json?v=${version}`).then(r => r.ok ? r.json() : []),
                            fetch(`results.json?v=${version}`).then(r => r.ok ? r.json() : [])
                        ]);
                        
                        if (pRes.status === 'fulfilled') setPredictions(pRes.value);
                        if (hRes.status === 'fulfilled') setHistory(hRes.value);
                    } catch (e) { 
                        console.error("Error cargando archivos:", e); 
                    } finally {
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            // Cálculo dinámico de Efectividad (Win Rate)
            const stats = useMemo(() => {
                if (!Array.isArray(history) || history.length === 0) return "--";
                const hits = history.filter(r => {
                    if (r.Actual_Home === undefined || r.Actual_Away === undefined) return false;
                    return (r.Pred_Home > r.Pred_Away) === (r.Actual_Home > r.Actual_Away);
                }).length;
                return Math.round((hits / history.length) * 100);
            }, [history]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#020617]">
                    <div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-amber-500 font-black text-xs uppercase tracking-[0.4em] animate-pulse italic">Sincronizando Oráculo...</p>
                </div>
            );

            return (
                <div className="min-h-screen max-w-7xl mx-auto px-4 sm:px-8 py-10">
                    {/* ENCABEZADO */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
                        <div className="text-center md:text-left">
                            <h1 className="text-5xl font-black italic tracking-tighter text-white uppercase leading-none">ORÁCULO<span className="text-amber-500 text-6xl">NBA</span></h1>
                            <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.5em] mt-2 italic">Carlos Intelligence Unit • V4.2</p>
                        </div>
                        <div className="flex gap-4 items-center bg-slate-900/80 border border-slate-800 p-6 rounded-[2rem] shadow-2xl">
                            <div className="text-right">
                                <p className="text-[9px] text-slate-500 font-black uppercase tracking-widest leading-none mb-1">Efectividad Global</p>
                                <p className="text-4xl font-black text-emerald-400 italic leading-none glow-wr">
                                    {stats}{typeof stats === 'number' ? '%' : ''} WR
                                </p>
                            </div>
                            <div className="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center font-black text-slate-950 text-4xl shadow-lg transition-transform hover:scale-105">C</div>
                        </div>
                    </header>

                    {/* CARTELERA ACTIVA */}
                    <section className="mb-24">
                        <h2 className="text-xl font-black text-white uppercase italic flex items-center gap-3 mb-8">
                            <span className="text-amber-500 text-2xl">⚡</span> Picks para Hoy
                        </h2>
                        {predictions.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                {predictions.map((g, i) => (
                                    <div key={i} className={`glass-card rounded-[3rem] overflow-hidden flex flex-col shadow-2xl ${g.edge > 7 ? 'ring-2 ring-amber-500/30' : ''}`}>
                                        <div className="px-8 py-4 flex justify-between items-center bg-slate-950/40 border-b border-slate-800/50 text-[10px] font-black uppercase">
                                            <span className="text-slate-500">{g.time}</span>
                                            <span className="text-amber-500 italic">{g.confidence}% Confianza</span>
                                        </div>
                                        <div className="p-10 flex justify-around items-center">
                                            <div className="text-center w-28">
                                                <p className="text-2xl font-black text-slate-700 uppercase mb-2 leading-none">{g.away}</p>
                                                <p className="text-4xl font-black text-white tabular-nums tracking-tighter leading-none">{g.aPred}</p>
                                            </div>
                                            <div className="text-slate-800 font-black text-2xl italic opacity-20">VS</div>
                                            <div className="text-center w-28">
                                                <p className="text-2xl font-black text-slate-700 uppercase mb-2 leading-none">{g.home}</p>
                                                <p className="text-4xl font-black text-white tabular-nums tracking-tighter leading-none">{g.hPred}</p>
                                            </div>
                                        </div>
                                        <div className="bg-slate-950/60 p-8 border-t border-slate-800/50 space-y-6">
                                            <div className="grid grid-cols-3 gap-2 text-center border-b border-slate-800 pb-6">
                                                <div>
                                                    <p className="text-[9px] text-slate-600 font-black uppercase mb-1 leading-none tracking-tighter">Total {g.totalType}</p>
                                                    <p className="text-xl font-black text-white italic leading-none">{g.total}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[9px] text-slate-600 font-black uppercase mb-1 leading-none tracking-tighter">Hándicap</p>
                                                    <p className="text-xl font-black text-white italic leading-none">{g.spread > 0 ? `+${g.spread}` : g.spread}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[9px] text-slate-600 font-black uppercase mb-1 leading-none tracking-tighter">Edge</p>
                                                    <p className="text-xl font-black text-amber-500 italic leading-none">+{g.edge}</p>
                                                </div>
                                            </div>
                                            <div className="bet-btn p-5 rounded-2xl text-center shadow-lg">
                                                <p className="text-[9px] font-black text-white/50 uppercase mb-1 leading-none tracking-tighter">Pick Recomendado</p>
                                                <p className="text-lg font-black text-white uppercase italic tracking-tighter leading-none">APOSTAR A: {g.pick}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-slate-900/20 border-2 border-dashed border-slate-800 p-20 rounded-[3rem] text-center max-w-2xl mx-auto shadow-inner">
                                <p className="text-amber-500 font-black uppercase tracking-[0.2em] text-sm italic mb-2">Cartelera Finalizada</p>
                                <p className="text-slate-500 font-medium text-xs">Esperando nuevos juegos o actualización de servidor...</p>
                            </div>
                        )}
                    </section>

                    {/* SECCIÓN DE AUDITORÍA (Aquí es donde corregimos el fallo) */}
                    <section className="max-w-6xl mx-auto">
                        <div className="flex justify-between items-end mb-8">
                            <h2 className="text-xl font-black text-white uppercase italic flex items-center gap-3">
                                <span className="text-emerald-500 text-2xl">📊</span> Auditoría: Predicción vs Real
                            </h2>
                            <button onClick={() => window.location.reload()} className="text-[10px] font-black text-emerald-500 hover:text-emerald-400 uppercase tracking-widest">[ Refrescar ]</button>
                        </div>
                        <div className="glass-card rounded-[3rem] overflow-hidden shadow-2xl">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-950 text-[10px] font-black text-slate-600 uppercase tracking-[0.2em] border-b border-slate-800">
                                        <tr>
                                            <th className="p-8">Encuentro</th>
                                            <th className="p-8">Predicción Pts</th>
                                            <th className="p-8">Marcador Real</th>
                                            <th className="p-8 text-center">Status ML</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/40">
                                        {Array.isArray(history) && history.length > 0 ? history.map((r, i) => {
                                            const isHit = (r.Pred_Home > r.Pred_Away) === (r.Actual_Home > r.Actual_Away);
                                            const pSpread = (r.Pred_Away - r.Pred_Home).toFixed(1);
                                            const rSpread = (r.Actual_Away - r.Actual_Home).toFixed(1);
                                            const spreadAcc = Math.abs(pSpread - rSpread).toFixed(1);

                                            return (
                                                <tr key={i} className="hover:bg-white/[0.02] transition-colors">
                                                    <td className="p-8">
                                                        <p className="text-sm font-black text-white uppercase leading-none mb-1">{r.Away} @ {r.Home}</p>
                                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">{r.Date}</p>
                                                    </td>
                                                    <td className="p-8">
                                                        <p className="text-amber-500/80 font-black text-sm tabular-nums mb-1 italic tracking-tighter">P: {r.Pred_Away}-{r.Pred_Home}</p>
                                                        <p className="text-[10px] text-slate-500 font-black italic">Hndcp: {pSpread}</p>
                                                    </td>
                                                    <td className="p-8">
                                                        <p className="text-white font-black text-sm tabular-nums tracking-tighter mb-1">R: {r.Actual_Away}-{r.Actual_Home}</p>
                                                        <p className="text-[10px] text-slate-400 font-black italic">Dif: {spreadAcc} pts</p>
                                                    </td>
                                                    <td className="p-8 text-center">
                                                        <span className={`px-5 py-2 rounded-xl text-[10px] font-black italic tracking-widest ${isHit ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 shadow-lg shadow-emerald-500/5' : 'bg-red-500/10 text-red-400 border border-red-500/20'}`}>
                                                            {isHit ? 'GANADA' : 'PERDIDA'}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        }) : (
                                            <tr>
                                                <td colSpan="4" className="p-24 text-center text-slate-700 text-xs font-black uppercase italic tracking-[0.4em]">
                                                    <div className="flex flex-col items-center gap-3">
                                                        <span>Sincronizando resultados oficiales...</span>
                                                        <p className="normal-case font-normal text-slate-500 text-[10px]">Si el workflow ya terminó, intenta refrescar la página.</p>
                                                    </div>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
