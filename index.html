<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo NBA - Carlos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.4);
            transition: transform 0.2s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(245, 158, 11, 0.5);
        }
        .bet-button {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    const version = new Date().getTime();
                    try {
                        const [pRes, hRes] = await Promise.allSettled([
                            fetch(`predictions.json?v=${version}`).then(r => r.json()),
                            fetch(`results.json?v=${version}`).then(r => r.json())
                        ]);
                        if (pRes.status === 'fulfilled') setPredictions(pRes.value);
                        if (hRes.status === 'fulfilled') setHistory(hRes.value);
                    } catch (e) { console.error("Error cargando datos:", e); }
                    setLoading(false);
                };
                loadData();
            }, []);

            const stats = useMemo(() => {
                if (history.length === 0) return { wr: 0 };
                const hits = history.filter(res => (res.Pred_Home > res.Pred_Away) === (res.Actual_Home > res.Actual_Away)).length;
                return { wr: Math.round((hits / history.length) * 100) };
            }, [history]);

            if (loading) return (
                <div className="flex h-screen items-center justify-center">
                    <div className="text-amber-500 font-black text-xl animate-pulse tracking-widest uppercase">Cargando Inteligencia...</div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-8 py-8">
                    {/* ENCABEZADO Y WIN RATE */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-12 gap-8">
                        <div className="text-center md:text-left">
                            <h1 className="text-4xl sm:text-5xl font-black italic tracking-tighter text-white">ORÁCULO<span className="text-amber-500">NBA</span></h1>
                            <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] mt-2">Carlos Intelligence Unit • V4.0</p>
                        </div>
                        <div className="flex gap-4 w-full md:w-auto">
                            <div className="flex-1 bg-slate-900 border border-slate-800 p-4 rounded-3xl text-center shadow-xl min-w-[120px]">
                                <p className="text-[9px] text-slate-500 font-black uppercase mb-1 tracking-widest">Efectividad</p>
                                <p className="text-2xl font-black text-emerald-400 italic">{stats.wr}% WR</p>
                            </div>
                            <div className="bg-amber-500 p-4 rounded-3xl text-slate-950 font-black flex items-center justify-center text-3xl shadow-lg shadow-amber-500/20 w-16 h-16">C</div>
                        </div>
                    </header>

                    {/* SECCIÓN 1: CARTELERA ACTIVA */}
                    <section className="mb-20">
                        <h2 className="text-xl font-black text-white mb-8 uppercase italic flex items-center gap-3">
                             <span className="text-amber-500 text-2xl">⚡</span> Cartelera para Hoy
                        </h2>
                        {predictions.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {predictions.map((game, i) => (
                                    <div key={i} className="glass-card rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl">
                                        <div className="px-6 py-4 flex justify-between items-center bg-slate-950/40 border-b border-slate-800/50 text-[10px] font-black uppercase">
                                            <span className="text-slate-500">{game.time} (MX)</span>
                                            <span className="text-amber-500 italic">{game.confidence}% Confianza</span>
                                        </div>
                                        <div className="p-8 flex justify-around items-center">
                                            <div className="text-center w-28">
                                                <p className="text-2xl font-black text-slate-700 uppercase mb-2 tracking-tight">{game.away}</p>
                                                <p className="text-3xl font-black text-white tabular-nums">{game.aPred}</p>
                                            </div>
                                            <div className="text-slate-800 font-black text-xl italic opacity-30">VS</div>
                                            <div className="text-center w-28">
                                                <p className="text-2xl font-black text-slate-700 uppercase mb-2 tracking-tight">{game.home}</p>
                                                <p className="text-3xl font-black text-white tabular-nums">{game.hPred}</p>
                                            </div>
                                        </div>
                                        <div className="bg-slate-950/60 p-6 border-t border-slate-800/50 space-y-4">
                                            <div className="grid grid-cols-2 gap-4 text-center border-b border-slate-800 pb-4">
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-600 uppercase mb-1 tracking-widest">Total {game.totalType}</p>
                                                    <p className="text-xl font-black text-white italic">{game.total}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-600 uppercase mb-1 tracking-widest">Edge Value</p>
                                                    <p className="text-xl font-black text-amber-500 italic">+{game.edge}</p>
                                                </div>
                                            </div>
                                            <div className="bet-button p-4 rounded-2xl text-center transform transition-all active:scale-95">
                                                <p className="text-[9px] font-black text-white/60 uppercase mb-1 leading-none tracking-tighter">Pronóstico Recomendado</p>
                                                <p className="text-base font-black text-white uppercase italic tracking-tighter leading-none">APOSTAR A: {game.pick}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-slate-900/20 border-2 border-dashed border-slate-800 p-20 rounded-[3rem] text-center max-w-2xl mx-auto">
                                <p className="text-slate-600 font-black uppercase tracking-[0.4em] text-xs italic">Sincronizando cartelera completa...</p>
                            </div>
                        )}
                    </section>

                    {/* SECCIÓN 2: AUDITORÍA COMPARATIVA */}
                    <section className="max-w-5xl mx-auto">
                        <h2 className="text-xl font-black text-white mb-8 uppercase italic flex items-center gap-3">
                             <span className="text-emerald-500 text-2xl">📊</span> Auditoría: Predicción vs Real
                        </h2>
                        <div className="glass-card rounded-[2.5rem] overflow-hidden shadow-2xl">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-950 text-[10px] font-black text-slate-600 uppercase tracking-widest border-b border-slate-800">
                                        <tr>
                                            <th className="p-6">Encuentro</th>
                                            <th className="p-6">Predicción Pts</th>
                                            <th className="p-6">Marcador Real</th>
                                            <th className="p-6 text-center">Estatus</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/40">
                                        {history.length > 0 ? history.map((res, i) => {
                                            const isHit = (res.Pred_Home > res.Pred_Away) === (res.Actual_Home > res.Actual_Away);
                                            return (
                                                <tr key={i} className="hover:bg-white/[0.02] transition-colors">
                                                    <td className="p-6">
                                                        <p className="text-sm font-black text-white uppercase leading-none mb-1">{res.Away} @ {res.Home}</p>
                                                        <p className="text-[9px] text-slate-500 font-bold uppercase">{res.Date}</p>
                                                    </td>
                                                    <td className="p-6 text-amber-500/90 font-black italic text-sm tabular-nums tracking-tighter">
                                                        {res.Pred_Away} - {res.Pred_Home}
                                                    </td>
                                                    <td className="p-6 text-white font-black text-sm tabular-nums tracking-tighter">
                                                        {res.Actual_Away} - {res.Actual_Home}
                                                    </td>
                                                    <td className="p-6 text-center">
                                                        <span className={`px-4 py-1.5 rounded-xl text-[10px] font-black italic tracking-widest ${isHit ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}`}>
                                                            {isHit ? 'GANADA' : 'PERDIDA'}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        }) : (
                                            <tr>
                                                <td colSpan="4" className="p-20 text-center text-slate-700 text-xs font-black uppercase italic tracking-widest">
                                                    Sincronizando auditoría de resultados...
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>

                    <footer className="mt-32 pb-16 text-center opacity-40">
                         <div className="w-10 h-px bg-slate-800 mx-auto mb-8"></div>
                         <p className="text-[10px] font-black uppercase tracking-[0.5em]">XGBoost Engine V4.0 • Optimized for Pro Picks</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
