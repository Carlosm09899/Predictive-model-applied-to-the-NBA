<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Oracle V5.1 - Carlos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 25px 30px -10px rgba(0, 0, 0, 0.6);
        }
        .bet-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }
        .badge { @apply px-2 py-0.5 rounded-lg text-[10px] font-black uppercase tracking-tighter flex items-center gap-1; }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    const v = new Date().getTime();
                    const fetchData = async (file) => {
                        try {
                            const r = await fetch(`./${file}?v=${v}`);
                            if (!r.ok) return "[]";
                            const text = await r.text();
                            return text.replace(/NaN/g, "null"); // Parche para NaNs
                        } catch (e) { return "[]"; }
                    };

                    try {
                        const [pRaw, hRaw] = await Promise.all([fetchData('predictions.json'), fetchData('results.json')]);
                        setPredictions(JSON.parse(pRaw));
                        setHistory(JSON.parse(hRaw));
                    } catch (e) { console.error(e); }
                    setLoading(false);
                };
                loadData();
            }, []);

            const stats = useMemo(() => {
                const valid = Array.isArray(history) ? history.filter(r => r.Actual_Home !== null) : [];
                if (valid.length === 0) return "--";
                const hits = valid.filter(r => (r.Pred_Home > r.Pred_Away) === (r.Actual_Home > r.Actual_Away)).length;
                return Math.round((hits / valid.length) * 100);
            }, [history]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#020617]">
                    <div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-amber-500 font-black text-xs uppercase tracking-[0.4em] animate-pulse italic">Cargando Inteligencia V5.1...</p>
                </div>
            );

            return (
                <div className="min-h-screen max-w-7xl mx-auto px-4 sm:px-8 py-10">
                    {/* HEADER */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
                        <div className="text-center md:text-left">
                            <h1 className="text-5xl font-black italic tracking-tighter text-white uppercase leading-none">ORÁCULO<span className="text-amber-500 text-6xl">NBA</span></h1>
                            <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.5em] mt-2 italic">Carlos Intelligence Unit • V5.1 PRO</p>
                        </div>
                        <div className="flex gap-4 items-center bg-slate-900/80 border border-slate-800 p-6 rounded-[2rem] shadow-2xl">
                            <div className="text-right">
                                <p className="text-[9px] text-slate-500 font-black uppercase tracking-widest leading-none mb-1">Efectividad ML</p>
                                <p className="text-4xl font-black text-emerald-400 italic leading-none">{stats}% WR</p>
                            </div>
                            <div className="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center font-black text-slate-950 text-4xl shadow-lg">C</div>
                        </div>
                    </header>

                    {/* SECCIÓN 1: PICKS POR CUARTOS Y LESIONES */}
                    <section className="mb-24">
                        <h2 className="text-xl font-black text-white mb-8 uppercase italic flex items-center gap-3">
                            <span className="text-amber-500 text-2xl">⚡</span> Análisis de Jornada
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-10">
                            {predictions.map((g, i) => (
                                <div key={i} className="glass-card rounded-[3rem] overflow-hidden flex flex-col shadow-2xl">
                                    {/* Score Predicho */}
                                    <div className="p-8 flex justify-between items-center bg-slate-950/40 border-b border-slate-800/50">
                                        <div className="text-center">
                                            <p className="text-xl font-black text-slate-500 uppercase leading-none mb-2">{g.away}</p>
                                            <p className="text-4xl font-black text-white tabular-nums">{g.aPred}</p>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="text-[10px] font-black text-slate-600 mb-1">{g.time}</span>
                                            <span className="text-2xl font-black text-slate-800 italic">VS</span>
                                            <span className="text-amber-500 font-black text-[10px] mt-1 italic">{g.confidence}% CONF.</span>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-xl font-black text-slate-500 uppercase leading-none mb-2">{g.home}</p>
                                            <p className="text-4xl font-black text-white tabular-nums">{g.hPred}</p>
                                        </div>
                                    </div>

                                    <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {/* Columna Izquierda: Lesiones */}
                                        <div className="space-y-4">
                                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">🚨 Reporte de Bajas</h3>
                                            <div className="space-y-2">
                                                {g.injuries && g.injuries.length > 0 ? g.injuries.map((inj, idx) => (
                                                    <div key={idx} className="flex justify-between items-center text-[10px] bg-slate-900/50 p-2 rounded-lg">
                                                        <span className="font-bold text-slate-300">{inj.player}</span>
                                                        <span className={`font-black uppercase ${inj.status === 'Out' ? 'text-red-500' : 'text-amber-500'}`}>{inj.status}</span>
                                                    </div>
                                                )) : <p className="text-[10px] italic text-emerald-500">Plantillas completas reportadas.</p>}
                                            </div>
                                        </div>

                                        {/* Columna Derecha: Picks por Cuarto */}
                                        <div className="bg-slate-950/60 p-5 rounded-3xl border border-slate-800">
                                            <h3 className="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-4 italic">🎯 Ganador por Periodo</h3>
                                            <div className="grid grid-cols-2 gap-2">
                                                {Object.entries(g.picks).map(([per, team]) => (
                                                    <div key={per} className="bg-slate-900/80 p-2 rounded-xl border border-slate-800 flex justify-between items-center">
                                                        <span className="text-[8px] font-black text-slate-600 uppercase">{per}</span>
                                                        <span className="text-[9px] font-black text-white italic uppercase">{team}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Botón de Acción */}
                                    <div className="px-8 pb-8">
                                        <div className="bet-btn p-4 rounded-2xl text-center">
                                            <p className="text-[9px] font-black text-white/50 uppercase mb-1 leading-none tracking-tighter italic">Recomendación Final</p>
                                            <p className="text-lg font-black text-white uppercase italic tracking-tighter leading-none">APOSTAR: {g.picks.Final} ML / {g.totalType} {g.total}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* SECCIÓN 2: AUDITORÍA DETALLADA ✅/❌ */}
                    <section className="max-w-6xl mx-auto">
                        <h2 className="text-xl font-black text-white mb-8 uppercase italic flex items-center gap-3">
                            <span className="text-emerald-500 text-2xl">📊</span> Auditoría de Apuestas
                        </h2>
                        <div className="glass-card rounded-[3rem] overflow-hidden shadow-2xl">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-950 text-[10px] font-black text-slate-600 uppercase tracking-[0.2em] border-b border-slate-800">
                                        <tr>
                                            <th className="p-8">Encuentro</th>
                                            <th className="p-8">Desglose de Resultados</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/40">
                                        {Array.isArray(history) && history.length > 0 ? history.map((r, i) => {
                                            const mlHit = (r.Pred_Home > r.Pred_Away) === (r.Actual_Home > r.Actual_Away);
                                            const sprHit = Math.abs((r.Actual_Home - r.Actual_Away) - (r.Pred_Home - r.Pred_Away)) < 6.5;
                                            const totHit = Math.abs((r.Actual_Home + r.Actual_Away) - (r.Pred_Total || (r.Pred_Home + r.Pred_Away))) < 8.5;

                                            return (
                                                <tr key={i} className="hover:bg-white/[0.02] transition-colors">
                                                    <td className="p-8">
                                                        <p className="text-sm font-black text-white uppercase leading-none mb-1">{r.Away} @ {r.Home}</p>
                                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-tighter italic">Real: {r.Actual_Away}-{r.Actual_Home}</p>
                                                    </td>
                                                    <td className="p-8">
                                                        <div className="flex flex-wrap gap-3">
                                                            <div className={`badge ${mlHit ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}`}>
                                                                Ganador {mlHit ? '✅' : '❌'}
                                                            </div>
                                                            <div className={`badge ${sprHit ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}`}>
                                                                Handicap {r.Pred_Spread > 0 ? '+' : ''}{r.Pred_Spread} {sprHit ? '✅' : '❌'}
                                                            </div>
                                                            <div className={`badge ${totHit ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}`}>
                                                                Total {r.Pred_Total} {totHit ? '✅' : '❌'}
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        }) : (
                                            <tr><td colSpan="2" className="p-20 text-center text-slate-700 text-xs font-black uppercase italic italic tracking-[0.4em]">Sincronizando historial...</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
