<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo NBA - Carlos Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Trophy: ({className}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            ),
            Zap: ({ size = 18, fill = "none", className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            ),
            Activity: ({ size = 20 }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            )
        };

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    const version = new Date().getTime();
                    try {
                        const [pRes, hRes] = await Promise.allSettled([
                            fetch(`predictions.json?v=${version}`).then(r => r.json()),
                            fetch(`results.json?v=${version}`).then(r => r.json())
                        ]);
                        if (pRes.status === 'fulfilled') setPredictions(pRes.value);
                        if (hRes.status === 'fulfilled') setHistory(hRes.value);
                    } catch (e) { console.error(e); }
                    setLoading(false);
                };
                loadData();
            }, []);

            // 🧮 Cálculo dinámico del Win Rate
            const stats = useMemo(() => {
                if (history.length === 0) return { wr: 0, hits: 0 };
                const hits = history.filter(res => {
                    const mlHit = (res.Pred_Home > res.Pred_Away) === (res.Actual_Home > res.Actual_Away);
                    return mlHit;
                }).length;
                return {
                    hits,
                    wr: Math.round((hits / history.length) * 100)
                };
            }, [history]);

            if (loading) return (
                <div className="flex h-screen flex-col items-center justify-center space-y-4">
                    <div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-amber-500 font-black text-xs uppercase tracking-[0.4em] animate-pulse">Iniciando Oráculo...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#020617] pb-20">
                    {/* Header y Stats Top */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-8 pt-8">
                        <header className="flex flex-col md:flex-row justify-between items-center gap-8 mb-12">
                            <div className="text-center md:text-left">
                                <h1 className="text-4xl sm:text-5xl font-black italic tracking-tighter text-white glow-text">ORÁCULO<span className="text-amber-500">NBA</span></h1>
                                <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] mt-2">Carlos Intelligence Unit • Engine V3.5</p>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4 w-full md:w-auto">
                                <div className="bg-slate-900/80 border border-slate-800 p-4 rounded-3xl shadow-xl flex items-center gap-4">
                                    <div className="bg-emerald-500/10 p-2.5 rounded-2xl text-emerald-400">
                                        <Icons.Activity size={24} />
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest leading-none mb-1">Efectividad</p>
                                        <p className="text-2xl font-black text-white italic">{stats.wr}% WR</p>
                                    </div>
                                </div>
                                <div className="bg-slate-900/80 border border-slate-800 p-4 rounded-3xl shadow-xl flex items-center gap-4">
                                    <div className="bg-amber-500 p-2 rounded-2xl text-slate-950 font-black text-xl w-11 h-11 flex items-center justify-center shadow-lg shadow-amber-500/20">
                                        C
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest leading-none mb-1">Status</p>
                                        <p className="text-sm font-black text-emerald-400 flex items-center gap-2">
                                            <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> ONLINE
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* SECCIÓN 1: CARTELERA ACTIVA */}
                        <section className="mb-20">
                            <div className="flex justify-between items-end mb-8">
                                <h2 className="text-xl font-black text-white flex items-center gap-3 uppercase tracking-tighter italic">
                                    <Icons.Zap size={22} className="text-amber-500" fill="currentColor"/> Cartelera de Hoy
                                </h2>
                                <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest bg-slate-900/50 px-3 py-1 rounded-lg border border-slate-800">
                                    {predictions.length} Juegos Activos
                                </span>
                            </div>

                            {predictions.length > 0 ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {predictions.map((game, i) => (
                                        <div key={i} className={`glass-card rounded-[2.5rem] overflow-hidden flex flex-col h-full ${game.edgeTotal > 8 ? 'ring-2 ring-amber-500/40 shadow-2xl shadow-amber-500/10' : ''}`}>
                                            <div className="px-6 py-4 flex justify-between items-center bg-slate-950/40 border-b border-slate-800/50 text-[10px] font-black uppercase">
                                                <span className="text-slate-500">{game.time} (MX)</span>
                                                <span className="text-amber-500 italic">{game.confidence}% Confianza</span>
                                            </div>
                                            <div className="p-8 flex-grow flex justify-around items-center">
                                                <div className="text-center w-28">
                                                    <p className="text-3xl font-black text-slate-800 uppercase leading-none mb-3">{game.awayTri}</p>
                                                    <p className="text-4xl font-black text-white tracking-tighter tabular-nums">{game.aPred}</p>
                                                </div>
                                                <div className="text-slate-800 font-black text-2xl italic tracking-tighter opacity-40 px-2">VS</div>
                                                <div className="text-center w-28">
                                                    <p className="text-3xl font-black text-slate-800 uppercase leading-none mb-3">{game.homeTri}</p>
                                                    <p className="text-4xl font-black text-white tracking-tighter tabular-nums">{game.hPred}</p>
                                                </div>
                                            </div>
                                            <div className="bg-slate-950/60 px-6 py-6 grid grid-cols-2 gap-6 text-center border-t border-slate-800/50">
                                                <div className="border-r border-slate-800/50">
                                                    <p className="text-[9px] font-black text-slate-600 uppercase mb-2 tracking-widest leading-none">Spread {game.homeTri}</p>
                                                    <p className="text-2xl font-black text-amber-500 italic leading-none">{game.spread > 0 ? `+${game.spread}` : game.spread}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-600 uppercase mb-2 tracking-widest leading-none">Total O/U</p>
                                                    <p className="text-2xl font-black text-white italic leading-none">{game.total}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-slate-900/20 border-2 border-dashed border-slate-800 p-20 rounded-[3rem] text-center">
                                    <p className="text-slate-600 font-black uppercase tracking-[0.4em] text-xs italic leading-relaxed">
                                        Analizando cartelera del día...<br/>(11:00 AM CDMX)
                                    </p>
                                </div>
                            )}
                        </section>

                        {/* SECCIÓN 2: AUDITORÍA CON WIN RATE INTEGRADO */}
                        <section className="max-w-5xl mx-auto">
                            <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8">
                                <h2 className="text-xl font-black text-white flex items-center gap-3 uppercase tracking-tighter italic">
                                    <Icons.Trophy className="text-emerald-500" /> Auditoría de Resultados
                                </h2>
                                <div className="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-2xl">
                                    <span className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Efectividad Global:</span>
                                    <span className="text-lg font-black text-emerald-400 italic">{stats.wr}% HIT RATE</span>
                                </div>
                            </div>

                            <div className="glass-card rounded-[2.5rem] overflow-hidden shadow-2xl">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-950 text-[10px] font-black text-slate-600 uppercase tracking-widest border-b border-slate-800">
                                            <tr>
                                                <th className="p-6">Encuentro</th>
                                                <th className="p-6 text-center">Moneyline</th>
                                                <th className="p-6 text-center">Spread</th>
                                                <th className="p-6 text-center">Total</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/40">
                                            {history.length > 0 ? history.map((res, i) => {
                                                const mlHit = (res.Pred_Home > res.Pred_Away) === (res.Actual_Home > res.Actual_Away);
                                                const spreadErr = Math.abs((res.Actual_Home - res.Actual_Away) - (res.Pred_Home - res.Pred_Away));
                                                const totalErr = Math.abs((res.Actual_Home + res.Actual_Away) - (res.Pred_Total || (res.Pred_Home + res.Pred_Away)));

                                                return (
                                                    <tr key={i} className="hover:bg-white/[0.02] transition-colors group">
                                                        <td className="p-6">
                                                            <div className="flex flex-col">
                                                                <span className="text-sm font-black text-white uppercase mb-1">{res.Away} @ {res.Home}</span>
                                                                <span className="text-[10px] text-slate-500 font-bold tabular-nums">Puntos Reales: {res.Actual_Away}-{res.Actual_Home}</span>
                                                            </div>
                                                        </td>
                                                        <td className="p-6 text-center">
                                                            <span className={`inline-flex items-center justify-center min-w-[60px] py-1.5 px-3 rounded-xl text-[10px] font-black italic tracking-widest ${mlHit ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 shadow-lg shadow-emerald-500/5' : 'bg-red-500/10 text-red-400 border border-red-500/20'}`}>
                                                                {mlHit ? 'WIN' : 'LOSS'}
                                                            </span>
                                                        </td>
                                                        <td className="p-6 text-center">
                                                            <span className={`inline-flex items-center justify-center min-w-[60px] py-1.5 px-3 rounded-xl text-[10px] font-black italic tracking-widest ${spreadErr < 6.5 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-500'}`}>
                                                                {spreadErr < 6.5 ? 'HIT' : `±${Math.round(spreadErr)}`}
                                                            </span>
                                                        </td>
                                                        <td className="p-6 text-center">
                                                            <span className={`inline-flex items-center justify-center min-w-[60px] py-1.5 px-3 rounded-xl text-[10px] font-black italic tracking-widest ${totalErr < 8.5 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-500'}`}>
                                                                {totalErr < 8.5 ? 'HIT' : `±${Math.round(totalErr)}`}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                );
                                            }) : (
                                                <tr>
                                                    <td colSpan="4" className="p-20 text-center text-slate-700 text-xs font-black uppercase italic tracking-[0.3em] leading-relaxed">
                                                        Sincronizando auditoría...<br/>(11:00 PM CDMX)
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </section>
                    </div>

                    <footer className="mt-32 pb-16 text-center border-t border-slate-900/50 pt-16">
                        <div className="max-w-xs mx-auto">
                            <div className="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center font-black text-slate-950 text-2xl mx-auto mb-6 shadow-xl shadow-amber-500/20">C</div>
                            <p className="text-[10px] text-slate-700 font-black uppercase tracking-[0.5em]">Engine V3.5 • Optimized</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
