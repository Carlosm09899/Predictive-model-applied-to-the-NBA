<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo NBA - Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Trophy: ({className}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            ),
            TrendingUp: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            ),
            Zap: ({ size = 20, fill = "none", className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            )
        };

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        // Intentamos cargar ambos JSONs
                        const [predRes, histRes] = await Promise.all([
                            fetch('predictions.json').then(r => r.json()).catch(() => []),
                            fetch('results.json').then(r => r.json()).catch(() => [])
                        ]);
                        setPredictions(predRes);
                        setHistory(histRes);
                    } catch (e) { console.error(e); }
                    setLoading(false);
                };
                loadData();
            }, []);

            if (loading) return <div className="flex h-screen items-center justify-center text-amber-500 font-black animate-pulse">CARGANDO ORÁCULO...</div>;

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-3xl font-black italic tracking-tighter text-white">ORÁCULO<span className="text-amber-500">NBA</span></h1>
                            <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Carlos Intelligence Unit • Live</p>
                        </div>
                        <div className="bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl">
                            <p className="text-[9px] text-slate-500 font-bold uppercase leading-none">ROI Estimado</p>
                            <p className="text-xl font-black text-emerald-400">+12.4%</p>
                        </div>
                    </header>

                    {/* SECCIÓN 1: PICKS DEL DÍA */}
                    <section className="mb-12">
                        <h2 className="text-xl font-black text-white mb-6 flex items-center gap-2 uppercase tracking-tighter italic">
                            <Icons.Zap size={18} className="text-amber-500" fill="currentColor"/> Cartelera de Hoy
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {predictions.map((game, i) => (
                                <div key={i} className={`bg-slate-900 border ${game.edgeTotal > 8 ? 'border-amber-500/50 shadow-lg shadow-amber-500/10' : 'border-slate-800'} rounded-[2rem] overflow-hidden`}>
                                    <div className="p-5 flex justify-between items-center border-b border-slate-800/50 bg-slate-950/40">
                                        <span className="text-[10px] font-black text-slate-500 uppercase">{game.time}</span>
                                        <span className="text-[10px] font-black text-amber-500 uppercase italic">{game.confidence}% Confianza</span>
                                    </div>
                                    <div className="p-6 flex justify-around items-center">
                                        <div className="text-center">
                                            <p className="text-3xl font-black text-slate-700">{game.awayTri}</p>
                                            <p className="text-2xl font-black text-white">{game.aPred}</p>
                                        </div>
                                        <div className="text-slate-800 font-black text-xl italic">VS</div>
                                        <div className="text-center">
                                            <p className="text-3xl font-black text-slate-700">{game.homeTri}</p>
                                            <p className="text-2xl font-black text-white">{game.hPred}</p>
                                        </div>
                                    </div>
                                    <div className="bg-slate-950 p-4 grid grid-cols-2 gap-4 text-center border-t border-slate-800">
                                        <div>
                                            <p className="text-[9px] font-bold text-slate-600 uppercase">Hándicap {game.homeTri}</p>
                                            <p className="text-lg font-black text-amber-500 italic">{game.spread > 0 ? `+${game.spread}` : game.spread}</p>
                                        </div>
                                        <div>
                                            <p className="text-[9px] font-bold text-slate-600 uppercase">Total O/U</p>
                                            <p className="text-lg font-black text-white italic">{game.total}</p>
                                        </div>
                                    </div>
                                    {game.edgeTotal > 8 && (
                                        <div className="bg-amber-500 p-3 text-center text-slate-950 font-black text-[10px] uppercase tracking-widest italic">
                                            ¡Valor Detectado! Edge: {game.edgeTotal} Pts
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* SECCIÓN 2: AUDITORÍA (RETROALIMENTACIÓN) */}
                    <section>
                        <h2 className="text-xl font-black text-white mb-6 flex items-center gap-2 uppercase tracking-tighter italic">
                            <Icons.Trophy size={18} className="text-emerald-500" /> Resultados Recientes
                        </h2>
                        <div className="bg-slate-900/40 border border-slate-800 rounded-3xl overflow-hidden shadow-xl">
                            <table className="w-full text-left">
                                <thead className="bg-slate-950/80 text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800">
                                    <tr>
                                        <th className="p-4">Juego</th>
                                        <th className="p-4">Predicción</th>
                                        <th className="p-4">Real</th>
                                        <th className="p-4">Status</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800/50">
                                    {history.map((res, i) => {
                                        const predWin = res.Pred_Home > res.Pred_Away ? res.Home : res.Away;
                                        const actualWin = res.Actual_Home > res.Actual_Away ? res.Home : res.Away;
                                        const hit = predWin === actualWin;
                                        return (
                                            <tr key={i} className="hover:bg-white/[0.02] transition-colors">
                                                <td className="p-4">
                                                    <p className="text-xs font-black text-white">{res.Away} @ {res.Home}</p>
                                                    <p className="text-[9px] text-slate-500 font-bold">{res.Date}</p>
                                                </td>
                                                <td className="p-4 text-xs font-bold text-slate-400">
                                                    {res.Pred_Away} - {res.Pred_Home}
                                                </td>
                                                <td className="p-4 text-xs font-black text-white italic">
                                                    {res.Actual_Away} - {res.Actual_Home}
                                                </td>
                                                <td className="p-4">
                                                    <span className={`px-2 py-1 rounded-md text-[9px] font-black italic ${hit ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}`}>
                                                        {hit ? '✅ GANO' : '❌ PERDIÓ'}
                                                    </span>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <footer className="mt-20 py-10 border-t border-slate-900 text-center">
                        <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center font-black text-slate-950 mx-auto mb-4">C</div>
                        <p className="text-[10px] text-slate-600 font-black uppercase tracking-[0.3em]">NBA Prediction Engine V3.5</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
