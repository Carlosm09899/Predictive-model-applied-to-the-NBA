<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Oracle V5.5 - Carlos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bet-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .badge-market {
            @apply px-2 py-0.5 rounded-lg text-[9px] font-black uppercase flex items-center gap-1 border transition-all;
        }
        .glow-wr {
            text-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
        }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    const v = new Date().getTime();
                    const fetchData = async (file) => {
                        try {
                            const r = await fetch(`./${file}?v=${v}`);
                            if (!r.ok) return "[]";
                            const text = await r.text();
                            return text.replace(/NaN/g, "null"); 
                        } catch (e) { return "[]"; }
                    };

                    try {
                        const [pRaw, hRaw] = await Promise.all([
                            fetchData('predictions.json'),
                            fetchData('results.json')
                        ]);
                        setPredictions(JSON.parse(pRaw) || []);
                        setHistory(JSON.parse(hRaw) || []);
                    } catch (e) { 
                        console.error("Error cargando datos:", e);
                    } finally {
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            const stats = useMemo(() => {
                const valid = Array.isArray(history) ? history.filter(r => r.Actual_Home !== null) : [];
                if (valid.length === 0) return "--";
                const hits = valid.filter(r => (r.Pred_Home > r.Pred_Away) === (r.Actual_Home > r.Actual_Away)).length;
                return Math.round((hits / valid.length) * 100);
            }, [history]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#020617]">
                    <div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-amber-500 font-black text-xs uppercase tracking-[0.4em] animate-pulse">Actualizando Auditoría V5.5...</p>
                </div>
            );

            return (
                <div className="min-h-screen max-w-7xl mx-auto px-4 sm:px-8 py-10">
                    {/* HEADER */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
                        <div>
                            <h1 className="text-4xl sm:text-5xl font-black italic tracking-tighter text-white uppercase leading-none">ORÁCULO<span className="text-amber-500 text-5xl sm:text-6xl">NBA</span></h1>
                            <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.5em] mt-2 italic">Carlos Intelligence Unit • Audit V5.5</p>
                        </div>
                        <div className="flex gap-4 items-center bg-slate-900/80 border border-slate-800 p-6 rounded-[2rem] shadow-2xl">
                            <div className="text-right">
                                <p className="text-[9px] text-slate-500 font-black uppercase mb-1">Win Rate Global (ML)</p>
                                <p className="text-3xl sm:text-4xl font-black text-emerald-400 italic leading-none glow-wr">{stats}% WR</p>
                            </div>
                            <div className="w-14 h-14 sm:w-16 sm:h-16 bg-amber-500 rounded-2xl flex items-center justify-center font-black text-slate-950 text-3xl sm:text-4xl shadow-lg">C</div>
                        </div>
                    </header>

                    {/* CARTELERA ACTUAL (Mantenida como ya la tenías) */}
                    <section className="mb-24">
                        <h2 className="text-xl font-black text-white mb-8 uppercase italic flex items-center gap-3">
                            <span className="text-amber-500 text-2xl">⚡</span> Pronósticos de Hoy
                        </h2>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            {predictions.map((g, i) => (
                                <div key={i} className="glass-card rounded-[3rem] overflow-hidden flex flex-col shadow-2xl border-t-4 border-amber-500/20">
                                    <div className="p-6 flex justify-between items-center bg-slate-950/40 border-b border-slate-800/50">
                                        <div className="text-center w-28">
                                            <p className="text-lg font-black text-slate-500 uppercase leading-none mb-1">{g.away}</p>
                                            <p className="text-3xl font-black text-white tabular-nums">{g.aPred}</p>
                                        </div>
                                        <div className="text-center">
                                            <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">{g.time}</span>
                                            <div className="text-2xl font-black text-slate-800 italic">VS</div>
                                        </div>
                                        <div className="text-center w-28">
                                            <p className="text-lg font-black text-slate-500 uppercase leading-none mb-1">{g.home}</p>
                                            <p className="text-3xl font-black text-white tabular-nums">{g.hPred}</p>
                                        </div>
                                    </div>

                                    <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-4">
                                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2 italic">🚨 Bajas</h3>
                                            <div className="space-y-1.5">
                                                {(g.injuries && g.injuries.length > 0) ? g.injuries.map((inj, idx) => (
                                                    <div key={idx} className="flex justify-between items-center text-[10px] bg-slate-900/50 p-2 rounded-lg border border-slate-800/50">
                                                        <span className="font-bold text-slate-300 truncate w-32">{inj.player}</span>
                                                        <span className="font-black text-red-500 uppercase">{inj.status}</span>
                                                    </div>
                                                )) : <p className="text-[10px] italic text-emerald-500 font-bold">Sin bajas reportadas.</p>}
                                            </div>
                                        </div>
                                        <div className="bg-slate-950/60 p-5 rounded-3xl border border-slate-800/50">
                                            <h3 className="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-4 italic text-center">🎯 Ganador por Periodo</h3>
                                            <div className="grid grid-cols-2 gap-2">
                                                {g.picks ? Object.entries(g.picks).map(([per, team]) => (
                                                    <div key={per} className="bg-slate-900/80 p-2 rounded-xl border border-slate-800 flex justify-between items-center">
                                                        <span className="text-[8px] font-black text-slate-600 uppercase">{per}</span>
                                                        <span className="text-[9px] font-black text-white italic uppercase truncate w-16 text-right">{team}</span>
                                                    </div>
                                                )) : <p className="col-span-2 text-[9px] text-slate-700 italic text-center">Calculando...</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* SECCIÓN DE AUDITORÍA AVANZADA */}
                    <section className="max-w-6xl mx-auto">
                        <h2 className="text-xl font-black text-white mb-8 uppercase italic flex items-center gap-3">
                            <span className="text-emerald-500 text-2xl">📊</span> Auditoría Maestra de Resultados
                        </h2>
                        <div className="glass-card rounded-[3rem] overflow-hidden shadow-2xl">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-950 text-[10px] font-black text-slate-600 uppercase tracking-[0.2em] border-b border-slate-800">
                                        <tr>
                                            <th className="p-8">Encuentro</th>
                                            <th className="p-8">Desglose Técnico (✅/❌)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/40">
                                        {Array.isArray(history) && history.length > 0 ? history.map((r, i) => {
                                            const mlHit = (r.Pred_Home > r.Pred_Away) === (r.Actual_Home > r.Actual_Away);
                                            const sprHit = Math.abs((r.Actual_Home - r.Actual_Away) - (r.Pred_Home - r.Pred_Away)) < 6.5;
                                            const totHit = Math.abs((r.Actual_Home + r.Actual_Away) - (r.Pred_Total || (r.Pred_Home + r.Pred_Away))) < 8.5;

                                            // Simulación de hits por periodo basada en el hándicap real (esto lo llenará tu backtester)
                                            // Por ahora usamos la lógica de ML_Hit como base para los periodos si no existen en el JSON
                                            const getHitIcon = (hitValue) => hitValue ? '✅' : '❌';

                                            return (
                                                <tr key={i} className="hover:bg-white/[0.02] transition-colors">
                                                    <td className="p-8">
                                                        <p className="text-sm font-black text-white uppercase leading-none mb-1">{r.Away} @ {r.Home}</p>
                                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-tighter italic">Final: {r.Actual_Away}-{r.Actual_Home} ({r.Date})</p>
                                                    </td>
                                                    <td className="p-8">
                                                        <div className="flex flex-col gap-4">
                                                            {/* Mercados Principales */}
                                                            <div className="flex flex-wrap gap-2">
                                                                <div className={`badge-market ${mlHit ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'}`}>ML {getHitIcon(mlHit)}</div>
                                                                <div className={`badge-market ${sprHit ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'}`}>HND {getHitIcon(sprHit)}</div>
                                                                <div className={`badge-market ${totHit ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'}`}>TOT {getHitIcon(totHit)}</div>
                                                            </div>
                                                            {/* Auditoría por Periodos */}
                                                            <div className="grid grid-cols-3 sm:grid-cols-6 gap-2">
                                                                {['Q1', 'Q2', '1H', 'Q3', 'Q4', '2H'].map(period => {
                                                                    // Aquí buscamos si el backtester guardó el hit específico (ej: Q1_Hit)
                                                                    const periodHit = r[`${period}_Hit`];
                                                                    const hasData = periodHit !== undefined && periodHit !== null;
                                                                    
                                                                    return (
                                                                        <div key={period} className={`px-2 py-1 rounded border text-[8px] font-bold text-center uppercase ${!hasData ? 'border-slate-800 text-slate-700' : (periodHit ? 'border-emerald-500/30 text-emerald-500 bg-emerald-500/5' : 'border-red-500/30 text-red-500 bg-red-500/5')}`}>
                                                                            {period}: {hasData ? getHitIcon(periodHit) : '--'}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        }) : (
                                            <tr><td colSpan="2" className="p-20 text-center text-slate-700 text-xs font-black uppercase italic tracking-[0.4em]">Sincronizando historial completo...</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
