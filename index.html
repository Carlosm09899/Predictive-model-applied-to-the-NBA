<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo NBA - Carlos Edition</title>
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #e2e8f0;
            margin: 0;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
    </style>
</head>
<body>
    <!-- Contenedor Raíz de React -->
    <div id="root"></div>

    <!-- Todo el código JavaScript/React va AQUÍ ADENTRO -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Trophy: ({className}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            ),
            Zap: ({ size = 18, fill = "none", className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            )
        };

        const App = () => {
            const [predictions, setPredictions] = useState([]);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const [pRes, hRes] = await Promise.allSettled([
                            fetch('predictions.json').then(r => r.json()),
                            fetch('results.json').then(r => r.json())
                        ]);
                        if (pRes.status === 'fulfilled') setPredictions(pRes.value);
                        if (hRes.status === 'fulfilled') setHistory(hRes.value);
                    } catch (e) { 
                        console.error("Esperando datos...", e); 
                    }
                    setLoading(false);
                };
                loadData();
            }, []);

            if (loading) return (
                <div className="flex h-screen flex-col items-center justify-center space-y-4">
                    <div className="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-amber-500 font-black text-[10px] uppercase tracking-[0.3em]">Sincronizando Oráculo...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto p-5 pb-20">
                    <header className="flex justify-between items-center mb-8 pt-4">
                        <div>
                            <h1 className="text-2xl font-black italic tracking-tighter text-white">ORÁCULO<span className="text-amber-500">NBA</span></h1>
                            <p className="text-slate-500 text-[9px] font-black uppercase tracking-widest">Carlos Intelligence Unit</p>
                        </div>
                        <div className="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-xl text-center">
                            <p className="text-[8px] text-slate-500 font-black uppercase mb-0.5 tracking-tighter leading-none">Status</p>
                            <p className="text-xs font-black text-emerald-400">ONLINE</p>
                        </div>
                    </header>

                    {/* SECCIÓN 1: CARTELERA */}
                    <section className="mb-10">
                        <h2 className="text-sm font-black text-white mb-5 flex items-center gap-2 uppercase tracking-tight italic">
                            <Icons.Zap size={16} className="text-amber-500" fill="currentColor"/> Picks de Hoy
                        </h2>
                        {predictions.length > 0 ? (
                            <div className="space-y-6">
                                {predictions.map((game, i) => (
                                    <div key={i} className={`glass-card rounded-[2rem] overflow-hidden ${game.edgeTotal > 8 ? 'ring-1 ring-amber-500/50 shadow-lg shadow-amber-500/5' : ''}`}>
                                        <div className="px-5 py-3 flex justify-between items-center bg-slate-950/40 border-b border-slate-800/50">
                                            <span className="text-[9px] font-black text-slate-500 uppercase">{game.time}</span>
                                            <span className="text-[9px] font-black text-amber-500 uppercase italic">{game.confidence}% Conf.</span>
                                        </div>
                                        <div className="p-6 flex justify-around items-center">
                                            <div className="text-center w-20">
                                                <p className="text-2xl font-black text-slate-700 leading-none mb-1 uppercase">{game.awayTri}</p>
                                                <p className="text-xl font-black text-white leading-none tracking-tighter">{game.aPred}</p>
                                            </div>
                                            <div className="text-slate-800 font-black text-lg italic tracking-tighter">VS</div>
                                            <div className="text-center w-20">
                                                <p className="text-2xl font-black text-slate-700 leading-none mb-1 uppercase">{game.homeTri}</p>
                                                <p className="text-xl font-black text-white leading-none tracking-tighter">{game.hPred}</p>
                                            </div>
                                        </div>
                                        <div className="bg-slate-950/60 px-5 py-3.5 grid grid-cols-2 gap-4 text-center border-t border-slate-800/50">
                                            <div>
                                                <p className="text-[8px] font-black text-slate-600 uppercase mb-0.5 tracking-widest leading-none">Hándicap {game.homeTri}</p>
                                                <p className="text-base font-black text-amber-500 italic leading-none">{game.spread > 0 ? `+${game.spread}` : game.spread}</p>
                                            </div>
                                            <div>
                                                <p className="text-[8px] font-black text-slate-600 uppercase mb-0.5 tracking-widest leading-none">Total O/U</p>
                                                <p className="text-base font-black text-white italic leading-none">{game.total}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-slate-900/30 border border-dashed border-slate-800 p-8 rounded-[2rem] text-center">
                                <p className="text-slate-600 font-black uppercase tracking-widest text-[9px] italic leading-relaxed">Esperando cartelera de la tarde<br/>(4:00 PM CDMX)</p>
                            </div>
                        )}
                    </section>

                    {/* SECCIÓN 2: AUDITORÍA */}
                    <section>
                        <h2 className="text-sm font-black text-white mb-5 flex items-center gap-2 uppercase tracking-tight italic">
                            <Icons.Trophy className="text-emerald-500" /> Auditoría de Ayer
                        </h2>
                        <div className="glass-card rounded-[2rem] overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-950 text-[8px] font-black text-slate-600 uppercase tracking-widest border-b border-slate-800">
                                        <tr>
                                            <th className="p-4">Juego</th>
                                            <th className="p-4">Real</th>
                                            <th className="p-4 text-right">Estatus</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/40">
                                        {history.length > 0 ? history.map((res, i) => {
                                            const pWin = res.Pred_Home > res.Pred_Away ? res.Home : res.Away;
                                            const aWin = res.Actual_Home > res.Actual_Away ? res.Home : res.Away;
                                            const isHit = pWin === aWin;
                                            return (
                                                <tr key={i}>
                                                    <td className="p-4">
                                                        <p className="text-[10px] font-black text-white uppercase">{res.Away} @ {res.Home}</p>
                                                        <p className="text-[8px] text-slate-600 font-bold uppercase">{res.Date}</p>
                                                    </td>
                                                    <td className="p-4 text-xs font-black text-white italic tabular-nums tracking-tighter">
                                                        {res.Actual_Away}-{res.Actual_Home}
                                                    </td>
                                                    <td className="p-4 text-right">
                                                        <span className={`px-2 py-0.5 rounded text-[8px] font-black italic tracking-widest ${isHit ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}`}>
                                                            {isHit ? '✅ GANO' : '❌ PERDIÓ'}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        }) : (
                                            <tr>
                                                <td colSpan="3" className="p-8 text-center text-slate-700 text-[8px] font-black uppercase tracking-[0.2em] italic leading-relaxed">
                                                    Esperando auditoría de madrugada<br/>(4:00 AM CDMX)
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>

                    <footer className="mt-16 py-8 border-t border-slate-900/50 text-center">
                        <div className="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center font-black text-slate-950 mx-auto mb-4 text-sm shadow-lg shadow-amber-500/10">C</div>
                        <p className="text-[8px] text-slate-600 font-black uppercase tracking-[0.3em]">NBA Prediction Engine V3.5</p>
                    </footer>
                </div>
            );
        };

        // Renderizado Final
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
